<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dashboard - Auth System</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			theme: {
				extend: {
					colors: {
						brand: {
							50: '#eef2ff',
							100: '#e0e7ff',
							500: '#667eea',
							600: '#5b6ee0',
							700: '#4f46e5'
						},
						accent: {
							500: '#7a52b5'
						}
					},
					fontFamily: {
						sans: ['Manrope', 'ui-sans-serif', 'system-ui', 'sans-serif']
					}
				}
			}
		};
	</script>
	<style>
		.notice { display: none; }
		.notice.show { display: block; }
		.empty-state { display: none; }
		.empty-state.active { display: block; }
		.loading-state { display: none; }
		.loading-state.show { display: block; }
	</style>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_12%_10%,rgba(255,255,255,0.18),transparent_30%),radial-gradient(circle_at_90%_0%,rgba(255,255,255,0.14),transparent_32%),linear-gradient(140deg,#4557d6_0%,#6b53d4_50%,#8b52c0_100%)] p-3 text-slate-800 sm:p-4">
	<div class="fixed inset-x-3 top-3 z-20 flex items-center justify-between gap-3 sm:inset-x-4 sm:top-4">
		<button class="rounded-full border border-white/30 bg-white/20 px-4 py-2.5 text-sm font-bold text-white shadow-lg backdrop-blur transition hover:-translate-y-0.5" type="button" onclick="goHome()">Home</button>
		<button class="rounded-full border border-white/30 bg-white/20 px-4 py-2.5 text-sm font-bold text-white shadow-lg backdrop-blur transition hover:-translate-y-0.5" type="button" onclick="logout()">Logout</button>
	</div>

	<div class="mx-auto mt-16 w-full max-w-6xl sm:mt-20">
		<div class="overflow-hidden rounded-3xl border border-white/55 bg-white/95 shadow-2xl">
			<div class="bg-gradient-to-r from-brand-600 to-accent-500 px-6 py-7 text-center text-white">
				<h1 class="text-3xl font-extrabold tracking-tight">Account Dashboard</h1>
				<p class="mt-2 text-sm text-white/85">Tap in to view your profile</p>
			</div>
			<div class="p-5 sm:p-6">
				<div id="notice" class="notice mb-4 rounded-xl px-3.5 py-3 text-sm"></div>
				<div id="pageLoading" class="loading-state mb-4 rounded-xl bg-brand-50 px-3.5 py-3 text-sm font-semibold text-brand-700">Loading your dashboard...</div>

				<div id="emptyState" class="empty-state px-3 py-2 text-center text-slate-600">
					<h2 class="text-3xl font-extrabold text-slate-900">Sign in first</h2>
					<p class="mt-2 text-sm">You need an active session to view your account dashboard.</p>
					<button class="mt-4 rounded-xl bg-gradient-to-r from-brand-600 to-accent-500 px-5 py-3 text-sm font-bold text-white shadow-lg transition hover:-translate-y-0.5" type="button" onclick="goHome()">Go to Login</button>
				</div>

				<div id="dashboardContent" class="grid grid-cols-1 items-start gap-5 lg:grid-cols-[360px_minmax(0,1fr)]">
					<aside class="rounded-2xl border border-slate-200 bg-slate-50 p-5 sm:p-6">
						<img id="profilePhoto" class="mx-auto mb-4 h-36 w-36 rounded-full border-4 border-brand-500 bg-slate-200 object-cover shadow-lg" alt="Profile photo">
						<h2 id="welcomeName" class="text-center text-3xl font-extrabold leading-tight text-slate-900"></h2>
						<p class="mt-2 text-center text-base text-slate-500">Your account dashboard</p>
						<p id="profileHandle" class="mt-2 text-center text-lg font-bold text-brand-600"></p>

						<div class="mt-5 grid gap-2.5">
							<div class="rounded-xl border border-slate-200 bg-white px-3.5 py-3"><span class="mb-1 block text-xs text-slate-500">Full Name</span><span id="fullName" class="block break-words text-sm font-bold text-slate-900"></span></div>
							<div class="rounded-xl border border-slate-200 bg-white px-3.5 py-3"><span class="mb-1 block text-xs text-slate-500">Username</span><span id="username" class="block break-words text-sm font-bold text-slate-900"></span></div>
							<div class="rounded-xl border border-slate-200 bg-white px-3.5 py-3"><span class="mb-1 block text-xs text-slate-500">Email</span><span id="email" class="block break-words text-sm font-bold text-slate-900"></span></div>
							<div class="rounded-xl border border-slate-200 bg-white px-3.5 py-3"><span class="mb-1 block text-xs text-slate-500">User ID</span><span id="userId" class="block break-words text-sm font-bold text-slate-900"></span></div>
							<div class="rounded-xl border border-slate-200 bg-white px-3.5 py-3"><span class="mb-1 block text-xs text-slate-500">Created</span><span id="createdAt" class="block break-words text-sm font-bold text-slate-900"></span></div>
						</div>

						<div class="mt-5 grid gap-3">
							<button class="rounded-xl bg-gradient-to-r from-brand-600 to-accent-500 px-4 py-3 text-sm font-bold text-white shadow-md transition hover:-translate-y-0.5" type="button" onclick="openMessagesPage()">Friends Messages</button>
							<button class="rounded-xl bg-brand-50 px-4 py-3 text-sm font-bold text-brand-700 transition hover:bg-brand-100" type="button" onclick="goHome()">Back</button>
							<button id="refreshBtn" class="rounded-xl bg-gradient-to-r from-brand-600 to-accent-500 px-4 py-3 text-sm font-bold text-white shadow-md transition hover:-translate-y-0.5 disabled:cursor-not-allowed disabled:opacity-70" type="button" onclick="refreshProfile()">Refresh</button>
						</div>
					</aside>

					<div class="grid gap-5">
						<section class="rounded-2xl border border-slate-200 bg-slate-50 p-5 sm:p-6">
							<h3 class="mb-3 text-2xl font-extrabold text-slate-900">Friends Feed</h3>
							<div id="feedList" class="grid gap-3"></div>
						</section>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		const BASE_ORIGIN = window.location.origin && window.location.origin !== 'null'
			? window.location.origin
			: 'http://localhost:5000';
		const API_URL = `${BASE_ORIGIN}/api/auth`;
		const SOCIAL_API_URL = `${BASE_ORIGIN}/api/social`;
		let heartbeatTimer = null;
		let noticeTimer = null;

		function goHome() {
			window.location.href = `${BASE_ORIGIN}/`;
		}

		function openMessagesPage() {
			window.location.href = `${BASE_ORIGIN}/messages.html`;
		}

		function showNotice(message, type = 'success') {
			const notice = document.getElementById('notice');
			notice.textContent = message;
			notice.className = `notice show mb-4 rounded-xl px-3.5 py-3 text-sm ${type === 'error' ? 'bg-red-100 text-red-700' : 'bg-emerald-100 text-emerald-700'}`;

			if (noticeTimer) {
				clearTimeout(noticeTimer);
			}

			noticeTimer = setTimeout(() => {
				hideNotice();
			}, 3200);
		}

		function hideNotice() {
			const notice = document.getElementById('notice');
			notice.className = 'notice';
			notice.textContent = '';
		}

		function setDashboardLoading(isLoading, text = 'Loading your dashboard...') {
			const loading = document.getElementById('pageLoading');
			if (!loading) {
				return;
			}

			loading.textContent = text;
			loading.className = isLoading
				? 'loading-state show mb-4 rounded-xl bg-brand-50 px-3.5 py-3 text-sm font-semibold text-brand-700'
				: 'loading-state mb-4 rounded-xl bg-brand-50 px-3.5 py-3 text-sm font-semibold text-brand-700';
		}

		function setRefreshBusy(isBusy) {
			const refreshBtn = document.getElementById('refreshBtn');
			if (!refreshBtn) {
				return;
			}

			refreshBtn.disabled = isBusy;
			refreshBtn.textContent = isBusy ? 'Refreshing...' : 'Refresh';
		}

		function defaultAvatar(name) {
			const initial = (name || '?').trim().charAt(0).toUpperCase();
			return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
					<rect width="200" height="200" rx="100" fill="#667eea"></rect>
					<text x="100" y="118" font-size="84" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif">${initial}</text>
				</svg>
			`)}`;
		}

		function escapeHtml(value) {
			return String(value || '')
				.replaceAll('&', '&amp;')
				.replaceAll('<', '&lt;')
				.replaceAll('>', '&gt;')
				.replaceAll('"', '&quot;')
				.replaceAll("'", '&#039;');
		}

		function avatarSource(photo, name) {
			return photo || defaultAvatar(name);
		}

		async function sendPresenceHeartbeat(token) {
			if (!token) {
				return;
			}

			try {
				await fetch(`${SOCIAL_API_URL}/presence/heartbeat`, {
					method: 'POST',
					headers: { Authorization: `Bearer ${token}` }
				});
			} catch (error) {
				// Keep dashboard usable even if heartbeat fails.
			}
		}

		function setProfile(user) {
			document.getElementById('emptyState').classList.remove('active');
			document.getElementById('dashboardContent').style.display = 'grid';
			document.getElementById('profilePhoto').src = avatarSource(user.photo, user.name);
			document.getElementById('welcomeName').textContent = `Welcome, ${user.name}!`;
			document.getElementById('profileHandle').textContent = `@${user.username || 'user'}`;
			document.getElementById('fullName').textContent = user.name || '';
			document.getElementById('username').textContent = user.username || '';
			document.getElementById('email').textContent = user.email || '';
			document.getElementById('userId').textContent = user.id || '';
			document.getElementById('createdAt').textContent = user.createdAt ? new Date(user.createdAt).toLocaleString() : '';
		}

		function renderFeed(feed) {
			const container = document.getElementById('feedList');

			if (!feed.length) {
				container.innerHTML = '<div class="text-xs text-slate-500">No posts yet. Add friends and create posts.</div>';
				return;
			}

			container.innerHTML = feed.map((post) => {
				const author = post.author || {};
				const authorName = author.name || 'Unknown';
				const authorUsername = author.username || 'unknown';

				return `
					<div class="rounded-2xl border border-slate-200 bg-white px-4 py-3">
						<div class="mb-2.5 flex items-start justify-between gap-3">
							<div class="flex min-w-0 items-center gap-3">
								<img class="h-12 w-12 rounded-full bg-slate-200 object-cover" src="${escapeHtml(avatarSource(author.photo, authorName))}" alt="${escapeHtml(authorName)}">
								<div class="min-w-0">
									<div class="mb-0.5 text-sm text-slate-700"><strong>${escapeHtml(authorName)}</strong> (@${escapeHtml(authorUsername)})</div>
									<div class="text-xs text-slate-500">${new Date(post.createdAt).toLocaleString()}</div>
								</div>
							</div>
						</div>
						<div class="text-sm text-slate-700">${escapeHtml(post.content)}</div>
					</div>
				`;
			}).join('');
		}

		async function loadProfile() {
			hideNotice();
			setDashboardLoading(true);
			setRefreshBusy(true);
			const token = localStorage.getItem('token');

			if (!token) {
				setDashboardLoading(false);
				setRefreshBusy(false);
				document.getElementById('dashboardContent').style.display = 'none';
				document.getElementById('emptyState').classList.add('active');
				return;
			}

			document.getElementById('feedList').innerHTML = '<div class="rounded-xl border border-brand-100 bg-brand-50 px-3 py-2 text-sm text-brand-700">Loading feed...</div>';

			try {
				const profileResponse = await fetch(`${API_URL}/me`, {
					headers: { Authorization: `Bearer ${token}` }
				});

				const profileData = await profileResponse.json();
				if (!profileResponse.ok || !profileData.success || !profileData.user) {
					localStorage.removeItem('token');
					setDashboardLoading(false);
					setRefreshBusy(false);
					document.getElementById('dashboardContent').style.display = 'none';
					document.getElementById('emptyState').classList.add('active');
					showNotice('Session expired. Please sign in again.', 'error');
					return;
				}

				setProfile(profileData.user);
				await sendPresenceHeartbeat(token);

				if (heartbeatTimer) {
					clearInterval(heartbeatTimer);
				}

				heartbeatTimer = setInterval(() => {
					sendPresenceHeartbeat(token).catch(() => {});
				}, 20000);

				const feedResponse = await fetch(`${SOCIAL_API_URL}/feed`, {
					headers: { Authorization: `Bearer ${token}` }
				});

				const feedData = await feedResponse.json();
				if (feedResponse.ok && feedData.success) {
					renderFeed(feedData.feed || []);
				} else {
					renderFeed([]);
				}

				setDashboardLoading(false);
				setRefreshBusy(false);
			} catch (error) {
				setDashboardLoading(false);
				setRefreshBusy(false);
				document.getElementById('dashboardContent').style.display = 'none';
				document.getElementById('emptyState').classList.add('active');
				showNotice('Could not load your profile.', 'error');
			}
		}

		function refreshProfile() {
			loadProfile();
		}

		function logout() {
			if (heartbeatTimer) {
				clearInterval(heartbeatTimer);
				heartbeatTimer = null;
			}

			localStorage.removeItem('token');
			localStorage.removeItem('user');
			showNotice('Logged out successfully.', 'success');
			document.getElementById('dashboardContent').style.display = 'none';
			document.getElementById('emptyState').classList.add('active');
		}

		window.addEventListener('beforeunload', () => {
			if (heartbeatTimer) {
				clearInterval(heartbeatTimer);
			}
		});

		window.addEventListener('DOMContentLoaded', loadProfile);
	</script>
</body>
</html>
