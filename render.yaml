services:
  - type: web
    name: socialweb
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
    disk:
      name: socialweb-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
